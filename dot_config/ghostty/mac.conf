# mac.conf — macOS-specific Ghostty configuration
# Loaded via local.conf → config.ghostty chain.

# Keys to match KDE default binds
keybind = super+page_up=toggle_fullscreen
keybind = super+page_down=toggle_fullscreen

# ── Font ──────────────────────────────────────────────────────────────────────
font-size = 15

# ── Window close confirmation ─────────────────────────────────────────────────
# Match kitty mac.conf: confirm_os_window_close 0
confirm-close-surface = false

# ── Startup session ───────────────────────────────────────────────────────────
# Equivalent of kitty's startup_session. The script opens tabs and cds into
# the right directories via osascript, then hands off to an interactive shell.
#
# To disable the startup session on this machine, comment out this line.
initial-command = ~/.config/ghostty/sessions/bigmile.sh
